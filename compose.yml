networks:
  tarrobuild-net:
    driver: bridge

volumes:
  db_auth_data:
  db_users_data:
  db_products_data:
  db_categories_data:
  db_compatibility_data:
  db_providers_data:
  db_builds_data:
  db_estimates_data:
  db_recommendations_data:
  db_notifications_data:

services:
  # --- BASES DE DATOS ---
  db_auth: &db
    image: mysql:8.0
    container_name: db_auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_auth
      MYSQL_TCP_PORT: 3306
    ports:
      - "3306:3306"
    networks:
      - tarrobuild-net
    volumes:
      - db_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db_users:
    <<: *db
    container_name: db_users
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_users
      MYSQL_TCP_PORT: 3306
    ports:
      - "3307:3306"
    volumes:
      - db_users_data:/var/lib/mysql

  db_products:
    <<: *db
    container_name: db_products
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_products
      MYSQL_TCP_PORT: 3306
    ports:
      - "3308:3306"
    volumes:
      - db_products_data:/var/lib/mysql

  db_categories:
    <<: *db
    container_name: db_categories
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_categories
      MYSQL_TCP_PORT: 3306
    ports:
      - "3309:3306"
    volumes:
      - db_categories_data:/var/lib/mysql

  db_compatibility:
    <<: *db
    container_name: db_compatibility
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_compatibility
      MYSQL_TCP_PORT: 3306
    ports:
      - "3310:3306"
    volumes:
      - db_compatibility_data:/var/lib/mysql

  db_providers:
    <<: *db
    container_name: db_providers
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_providers
      MYSQL_TCP_PORT: 3306
    ports:
      - "3311:3306"
    volumes:
      - db_providers_data:/var/lib/mysql

  db_builds:
    <<: *db
    container_name: db_builds
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_builds
      MYSQL_TCP_PORT: 3306
    ports:
      - "3312:3306"
    volumes:
      - db_builds_data:/var/lib/mysql

  db_estimates:
    <<: *db
    container_name: db_estimates
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_estimates
      MYSQL_TCP_PORT: 3306
    ports:
      - "3313:3306"
    volumes:
      - db_estimates_data:/var/lib/mysql

  db_recommendations:
    <<: *db
    container_name: db_recommendations
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_recommendations
      MYSQL_TCP_PORT: 3306
    ports:
      - "3314:3306"
    volumes:
      - db_recommendations_data:/var/lib/mysql

  db_notifications:
    <<: *db
    container_name: db_notifications
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_notifications
      MYSQL_TCP_PORT: 3306
    ports:
      - "3315:3306"
    volumes:
      - db_notifications_data:/var/lib/mysql

  # --- MICROSERVICIOS BASE ---
  discovery-server:
    build:
      context: .
      dockerfile: ./services/discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    networks:
      - tarrobuild-net

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_auth:3306/db_auth
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_auth:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_users:3306/db_users
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_users:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  category-service:
    build:
      context: .
      dockerfile: ./services/category-service/Dockerfile
    container_name: category-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_categories:3306/db_categories
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_categories:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  provider-service:
    build:
      context: .
      dockerfile: ./services/provider-service/Dockerfile
    container_name: provider-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_providers:3306/db_providers
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_providers:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_notifications:3306/db_notifications
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_notifications:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  # --- MICROSERVICIOS DEPENDIENTES ---
  product-service:
    build:
      context: .
      dockerfile: ./services/product-service/Dockerfile
    container_name: product-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_products:3306/db_products
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_products:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  compatibility-service:
    build:
      context: .
      dockerfile: ./services/compatibility-service/Dockerfile
    container_name: compatibility-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_compatibility:3306/db_compatibility
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_compatibility:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  build-service:
    build:
      context: .
      dockerfile: ./services/build-service/Dockerfile
    container_name: build-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_builds:3306/db_builds
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_builds:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  estimate-service:
    build:
      context: .
      dockerfile: ./services/estimate-service/Dockerfile
    container_name: estimate-service
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: 8088
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_estimates:3306/db_estimates
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_estimates:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  hardware-advisor-service:
    build:
      context: .
      dockerfile: ./services/hardware-advisor-service/Dockerfile
    container_name: hardware-advisor-service
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db_recommendations:3306/db_recommendations
      EUREKA_URL: http://discovery-server:8761/eureka/
    depends_on:
      db_recommendations:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net

  # --- PUERTA DE ENTRADA ---
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8083
      CATEGORY_SERVICE_URL: http://category-service:8084
      COMPATIBILITY_SERVICE_URL: http://compatibility-service:8085
      PROVIDER_SERVICE_URL: http://provider-service:8086
      BUILD_SERVICE_URL: http://build-service:8087
      ESTIMATE_SERVICE_URL: http://estimate-service:8088
      HARDWARE_ADVISOR_SERVICE_URL: http://hardware-advisor-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - tarrobuild-net
databases:
  - name: tarrobuild-db
    databaseName: tarrobuild
    user: tarrobuild
    plan: free

services:
  # ─── Service Discovery ──────────────────────────────────────────
  - type: web
    name: discovery-server
    runtime: docker
    dockerfilePath: ./services/discovery-server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SERVER_PORT
        value: 8761

  # ─── No-dependency services ──────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./services/user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: tarrobuild-db
          property: connectionString
      - key: EUREKA_URL
        value: https://discovery-server-whs1.onrender.com/eureka/

  - type: web
    name: category-service
    runtime: docker
    dockerfilePath: ./services/category-service/Dockerfile
    dockerContext: .
    plan: free

databases:
  - name: tarrobuild-db
    databaseName: tarrobuild
    user: tarrobuild
    plan: free

services:
  # ─── No-dependency services ──────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./services/user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: tarrobuild-db
          property: connectionString

  - type: web
    name: category-service
    runtime: docker
    dockerfilePath: ./services/category-service/Dockerfile
    dockerContext: .
    plan: free

spring:
  application:
    name: estimate-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/estimate-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

server:
  port: ${SERVER_PORT:8088}

restclient:
  connect-timeout: 5000
  read-timeout: 10000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
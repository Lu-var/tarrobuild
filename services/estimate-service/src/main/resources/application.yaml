spring:
  application:
    name: estimate-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}

build-service:
  url: ${BUILD_SERVICE_URL:http://localhost:8087}

product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8083}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://localhost:8090}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/estimate-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

server:
  port: ${SERVER_PORT:8088}
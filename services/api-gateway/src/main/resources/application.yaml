spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  cloud:
    gateway:
      routes:
        - id: compatibility-service
          uri: lb://compatibility-service
          predicates:
            - Path=/api/v1/compatibility/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

server:
  port: ${SERVER_PORT:8080}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
  file:
    name: logs/api-gateway.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
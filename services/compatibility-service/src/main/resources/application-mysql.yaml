spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_compatibility}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8083}

category-service:
  url: ${CATEGORY_SERVICE_URL:http://localhost:8084}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/compatibility-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10


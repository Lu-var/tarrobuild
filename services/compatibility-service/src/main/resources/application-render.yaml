spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true
    schemas: compatibility
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: compatibility
        format_sql: true
product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8083}

category-service:
  url: ${CATEGORY_SERVICE_URL:http://localhost:8084}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/compatibility-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

spring:
  application:
    name: compatibility-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}

server:
  port: ${SERVER_PORT:8085}

app:
  environment: production

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/compatibility-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

spring:
  application:
    name: hardware-advisor-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}

server:
  port: ${SERVER_PORT:8089}

app:
  environment: production

build-service:
  url: ${BUILD_SERVICE_URL:http://localhost:8087}

product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8083}

compatibility-service:
  url: ${COMPATIBILITY_SERVICE_URL:http://localhost:8085}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://localhost:8090}

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/hardware-advisor-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

spring:

  cloud:
    discovery:
      client:
        simple:
          instances:
            build-service:
              - uri: https://build-service-lym5.onrender.com
            product-service:
              - uri: https://product-service-e903.onrender.com
            compatibility-service:
              - uri: https://compatibility-service.onrender.com
            notification-service:
              - uri: https://notification-service-e4ij.onrender.com

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      max-lifetime: 600000
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true
    schemas: hardware_advisor
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hardware_advisor
        format_sql: true

app:
  environment: production

feign:
  client:
    connect-timeout: 30
    read-timeout: 90

logging:
  level:
    cl.tarrobuild: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/hardware-advisor-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

eureka:
  client:
    enabled: false

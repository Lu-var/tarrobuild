spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

app:
  environment: production

logging:
  level:
    root: WARN
    cl.tarrobuild: INFO
  file:
    name: /var/log/hardware-advisor-service/hardware-advisor-service.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

build-service:
  url: ${BUILD_SERVICE_URL:http://build-service:8087}

product-service:
  url: ${PRODUCT_SERVICE_URL:http://product-service:8083}

compatibility-service:
  url: ${COMPATIBILITY_SERVICE_URL:http://compatibility-service:8085}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8090}
